<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="600" height="160">
  <defs>
    <linearGradient id="bodyGrad2" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" style="stop-color:#86efac" />
      <stop offset="50%" style="stop-color:#4ade80" />
      <stop offset="100%" style="stop-color:#22c55e" />
    </linearGradient>
    <linearGradient id="clawGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bbf7d0" />
      <stop offset="100%" style="stop-color:#4ade80" />
    </linearGradient>
  </defs>
  
  <!-- Crab Icon -->
  <g transform="translate(20, 10) scale(0.7)">
    <!-- Legs Left -->
    <g fill="#16a34a">
      <ellipse cx="55" cy="130" rx="6" ry="12" transform="rotate(-35 55 130)"/>
      <ellipse cx="50" cy="112" rx="5" ry="11" transform="rotate(-25 50 112)"/>
      <ellipse cx="52" cy="95" rx="5" ry="10" transform="rotate(-15 52 95)"/>
    </g>
    
    <!-- Legs Right -->
    <g fill="#16a34a">
      <ellipse cx="145" cy="130" rx="6" ry="12" transform="rotate(35 145 130)"/>
      <ellipse cx="150" cy="112" rx="5" ry="11" transform="rotate(25 150 112)"/>
      <ellipse cx="148" cy="95" rx="5" ry="10" transform="rotate(15 148 95)"/>
    </g>
    
    <!-- Left Claw Arm -->
    <path d="M 60 85 Q 40 65 25 50" stroke="#22c55e" stroke-width="7" fill="none" stroke-linecap="round"/>
    
    <!-- Left Claw -->
    <g transform="translate(18, 38) rotate(-25)">
      <ellipse cx="0" cy="0" rx="20" ry="18" fill="url(#clawGrad2)"/>
      <ellipse cx="-5" cy="-5" rx="12" ry="10" fill="#dcfce7" opacity="0.7"/>
      <ellipse cx="8" cy="-8" rx="8" ry="6" fill="#86efac" opacity="0.5"/>
    </g>
    
    <!-- Right Claw Arm -->
    <path d="M 140 85 Q 160 65 175 50" stroke="#22c55e" stroke-width="7" fill="none" stroke-linecap="round"/>
    
    <!-- Right Claw -->
    <g transform="translate(182, 38) rotate(25)">
      <ellipse cx="0" cy="0" rx="20" ry="18" fill="url(#clawGrad2)"/>
      <ellipse cx="5" cy="-5" rx="12" ry="10" fill="#dcfce7" opacity="0.7"/>
      <ellipse cx="-8" cy="-8" rx="8" ry="6" fill="#86efac" opacity="0.5"/>
    </g>
    
    <!-- Body -->
    <ellipse cx="100" cy="100" rx="50" ry="38" fill="url(#bodyGrad2)"/>
    <ellipse cx="90" cy="88" rx="25" ry="15" fill="#bbf7d0" opacity="0.5"/>
    
    <!-- Eye Stalks -->
    <line x1="82" y1="72" x2="78" y2="55" stroke="#22c55e" stroke-width="5" stroke-linecap="round"/>
    <line x1="118" y1="72" x2="122" y2="55" stroke="#22c55e" stroke-width="5" stroke-linecap="round"/>
    
    <!-- Eyes -->
    <circle cx="78" cy="52" r="14" fill="white"/>
    <circle cx="122" cy="52" r="14" fill="white"/>
    <circle cx="78" cy="52" r="8" fill="#1f2937"/>
    <circle cx="122" cy="52" r="8" fill="#1f2937"/>
    <circle cx="81" cy="49" r="3" fill="white"/>
    <circle cx="125" cy="49" r="3" fill="white"/>
    
    <!-- Eyebrows -->
    <path d="M 70 38 Q 78 35 86 38" stroke="#15803d" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 114 38 Q 122 35 130 38" stroke="#15803d" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    
    <!-- Mouth -->
    <path d="M 90 115 Q 100 122 110 115" stroke="#15803d" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Cheeks -->
    <circle cx="68" cy="105" r="6" fill="#fca5a5" opacity="0.5"/>
    <circle cx="132" cy="105" r="6" fill="#fca5a5" opacity="0.5"/>
    
    <!-- Spots -->
    <circle cx="85" cy="95" r="3" fill="#22c55e" opacity="0.3"/>
    <circle cx="115" cy="92" r="2.5" fill="#22c55e" opacity="0.3"/>
    <circle cx="100" cy="105" r="2" fill="#22c55e" opacity="0.3"/>
  </g>
  
  <!-- Text -->
  <text x="160" y="105" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="48" font-weight="800" fill="#22c55e">Nemoclaw</text>
</svg>