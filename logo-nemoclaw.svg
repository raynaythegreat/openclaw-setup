<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Cute Green Crab Logo for Nemoclaw -->
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="clawGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#86efac;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Left Legs -->
  <ellipse cx="65" cy="130" rx="8" ry="15" fill="#22c55e" transform="rotate(-30 65 130)"/>
  <ellipse cx="60" cy="110" rx="7" ry="14" fill="#22c55e" transform="rotate(-20 60 110)"/>
  <ellipse cx="62" cy="90" rx="6" ry="12" fill="#22c55e" transform="rotate(-10 62 90)"/>
  
  <!-- Right Legs -->
  <ellipse cx="135" cy="130" rx="8" ry="15" fill="#22c55e" transform="rotate(30 135 130)"/>
  <ellipse cx="140" cy="110" rx="7" ry="14" fill="#22c55e" transform="rotate(20 140 110)"/>
  <ellipse cx="138" cy="90" rx="6" ry="12" fill="#22c55e" transform="rotate(10 138 90)"/>
  
  <!-- Main Body -->
  <ellipse cx="100" cy="105" rx="55" ry="40" fill="url(#bodyGrad)" filter="url(#softShadow)"/>
  
  <!-- Body Highlight -->
  <ellipse cx="100" cy="95" rx="35" ry="20" fill="#86efac" opacity="0.4"/>
  
  <!-- Left Claw Arm -->
  <path d="M 55 90 Q 35 70 25 55" stroke="#22c55e" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Left Claw -->
  <ellipse cx="22" cy="50" rx="18" ry="22" fill="url(#clawGrad)" transform="rotate(-20 22 50)"/>
  <ellipse cx="18" cy="45" rx="10" ry="14" fill="#bbf7d0" opacity="0.6" transform="rotate(-20 18 45)"/>
  
  <!-- Right Claw Arm -->
  <path d="M 145 90 Q 165 70 175 55" stroke="#22c55e" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Right Claw -->
  <ellipse cx="178" cy="50" rx="18" ry="22" fill="url(#clawGrad)" transform="rotate(20 178 50)"/>
  <ellipse cx="182" cy="45" rx="10" ry="14" fill="#bbf7d0" opacity="0.6" transform="rotate(20 182 45)"/>
  
  <!-- Eyes -->
  <circle cx="85" cy="70" r="12" fill="white"/>
  <circle cx="115" cy="70" r="12" fill="white"/>
  <circle cx="87" cy="70" r="6" fill="#1f2937"/>
  <circle cx="117" cy="70" r="6" fill="#1f2937"/>
  
  <!-- Eye shine -->
  <circle cx="89" cy="68" r="2" fill="white"/>
  <circle cx="119" cy="68" r="2" fill="white"/>
  
  <!-- Cute Smile -->
  <path d="M 90 125 Q 100 132 110 125" stroke="#15803d" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Cheeks -->
  <ellipse cx="70" cy="115" rx="8" ry="5" fill="#fca5a5" opacity="0.6"/>
  <ellipse cx="130" cy="115" rx="8" ry="5" fill="#fca5a5" opacity="0.6"/>
  
  <!-- Eyebrows (cute expression) -->
  <path d="M 78 58 Q 85 55 92 58" stroke="#15803d" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 108 58 Q 115 55 122 58" stroke="#15803d" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>